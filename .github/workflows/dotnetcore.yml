name: Build and publish HenTube

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hentube-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply HenTube customizations
        run: python3 scripts/customize_hentube.py

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate version
        id: version
        run: echo "value=$(date -u '+%Y.%-m%d.%-H%M.0')" >> "$GITHUB_OUTPUT"

      - name: Build plugins
        run: |
          dotnet build --configuration Release -p:Version=${{ steps.version.outputs.value }}
          dotnet build --configuration Release.Emby -p:Version=${{ steps.version.outputs.value }}

      - name: Collect release packages
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -euxo pipefail
          find Jellyfin.Plugin.MetaTube -type f -name '*.zip' -print
          jellyfin_zip="$(find Jellyfin.Plugin.MetaTube -type f -name 'Jellyfin.HenTube@v*.zip' -print -quit)"
          emby_zip="$(find Jellyfin.Plugin.MetaTube -type f -name 'Emby.HenTube@v*.zip' -print -quit)"
          test -n "$jellyfin_zip"
          test -n "$emby_zip"
          mkdir -p artifacts
          cp "$jellyfin_zip" "artifacts/Jellyfin.HenTube@v${VERSION}.zip"
          cp "$emby_zip" "artifacts/Emby.HenTube@v${VERSION}.zip"
          ls -l artifacts

      - name: Generate Jellyfin repository manifest
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -euxo pipefail
          python3 scripts/generate_hentube_manifest.py "artifacts/Jellyfin.HenTube@v${VERSION}.zip"
          python3 -m json.tool manifest.json >/dev/null
          cat manifest.json

      - name: Publish manifest branch
        run: |
          set -euxo pipefail
          git config user.name 'hentube-bot'
          git config user.email 'hentube-bot@users.noreply.github.com'
          git checkout --orphan dist
          git rm -rf .
          git add manifest.json
          git commit -m 'Update HenTube plugin repository'
          git push --force origin dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            HenTube build using the media basename for metadata searches.
          draft: false
          tag_name: v${{ steps.version.outputs.value }}
          files: |
            artifacts/Jellyfin.HenTube@v${{ steps.version.outputs.value }}.zip
            artifacts/Emby.HenTube@v${{ steps.version.outputs.value }}.zip
