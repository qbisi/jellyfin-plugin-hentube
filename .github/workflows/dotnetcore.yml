name: Build and publish HenTube

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hentube-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply HenTube customizations
        run: python3 scripts/customize_hentube.py

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate version
        id: version
        run: echo "value=$(date -u '+%Y.%-m%d.%-H%M.0')" >> "$GITHUB_OUTPUT"

      - name: Build plugins
        run: |
          dotnet build --configuration Release -p:Version=${{ steps.version.outputs.value }}
          dotnet build --configuration Release.Emby -p:Version=${{ steps.version.outputs.value }}

      - name: Generate Jellyfin repository manifest
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -euxo pipefail
          jellyfin_zip="Jellyfin.Plugin.MetaTube/bin/Jellyfin.HenTube@v${VERSION}.zip"
          test -f "$jellyfin_zip"
          ls -l Jellyfin.Plugin.MetaTube/bin/*.zip
          python3 scripts/manifest.py "$jellyfin_zip"
          python3 -m json.tool manifest.json >/dev/null

      - name: Publish manifest branch
        run: |
          git config user.name 'hentube-bot'
          git config user.email 'hentube-bot@users.noreply.github.com'
          git checkout --orphan dist
          git rm -rf .
          git add manifest.json
          git commit -m 'Update HenTube plugin repository'
          git push --force origin dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            HenTube build using the media basename for metadata searches.
          draft: false
          tag_name: v${{ steps.version.outputs.value }}
          files: |
            Jellyfin.Plugin.MetaTube/bin/Jellyfin.HenTube@v${{ steps.version.outputs.value }}.zip
            Jellyfin.Plugin.MetaTube/bin/Emby.HenTube@v${{ steps.version.outputs.value }}.zip
